name: Test, Build and Push Docker Image

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: mingcsiro/termai-rerank

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Set image metadata
        id: meta
        run: |
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          base_tags="${IMAGE_NAME}:${GITHUB_SHA}-base"$'\n'"${IMAGE_NAME}:base-latest"
          inference_tags="${IMAGE_NAME}:${GITHUB_SHA}-inference"$'\n'"${IMAGE_NAME}:inference-latest"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME//+/-}"
            base_tags="${base_tags}"$'\n'"${IMAGE_NAME}:${tag_name}-base"
            inference_tags="${inference_tags}"$'\n'"${IMAGE_NAME}:${tag_name}-inference"
          fi
          printf "base_tags<<EOF\n%s\nEOF\n" "$base_tags" >> "$GITHUB_OUTPUT"
          printf "inference_tags<<EOF\n%s\nEOF\n" "$inference_tags" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.base_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.inference
          push: true
          tags: ${{ steps.meta.outputs.inference_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
